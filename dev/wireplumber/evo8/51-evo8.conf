## Audient EVO8 - WirePlumber device rules
##
## - Disables idle suspension to prevent clicks/pops on resume
## - Disables upmix so stereo apps only send to CH1/CH2 (FL/FR),
##   keeping CH3+ clean for loopback and second output pair
## - Renames the ALSA nodes for clarity
##
## Install: ~/.config/wireplumber/wireplumber.conf.d/51-evo8.conf

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.usb-Audient_EVO8-00.*" }
    ]
    actions = {
      update-props = {
        node.pause-on-idle = false
        node.description = "EVO8 Hardware (6ch)"
        channelmix.upmix = false
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_input.usb-Audient_EVO8-00.*" }
    ]
    actions = {
      update-props = {
        node.pause-on-idle = false
        node.description = "EVO8 Capture"
      }
    }
  }
]
