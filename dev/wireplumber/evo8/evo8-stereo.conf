# Audient EVO8 PipeWire Channel Configuration
#
# The EVO8 exposes 6 USB channels in each direction:
#
#   Playback (host -> device):
#     CH1/CH2 (FL/FR)     - Main output 1+2 (PC 1+2 in mixer)
#     CH3/CH4 (FC/LFE)    - Output 3+4 (PC 3+4 in mixer)
#     CH5/CH6 (RL/RR)     - Loopback output (LOOP-BACK 1+2 in mixer)
#
#   Capture (device -> host):
#     CH1/CH2 (FL/FR)     - Mic/Line 1+2
#     CH3/CH4 (FC/LFE)    - Mic/Line 3+4
#     CH5/CH6 (RL/RR)     - Loopback capture (mixer bus output)
#
# The raw ALSA sink (6ch) is never used directly by apps. Instead,
# virtual stereo loopback sinks/sources split the 6 channels:
#   evo8_main_output     → CH1/CH2 (FL/FR)  — default sink for apps/games
#   evo8_output_3_4      → CH3/CH4 (FC/LFE) — second output pair
#   evo8_loopback_output → CH5/CH6 (RL/RR)  — feeds MU60 loopback bus
# (channelmix.upmix=false in 51-evo8.conf keeps CH3+ clean if
# anything does connect to the raw sink directly.)
#
# NOTE: ALSA node name format (analog-surround-51) needs verification
# with actual hardware - may vary by kernel/ALSA version.
#
# Install: ~/.config/pipewire/pipewire.conf.d/evo8-stereo.conf

context.modules = [
    # -- Main Stereo Output --------------------------------------------------
    # Stereo sink -> ALSA playback CH1/CH2 (FL/FR)
    # Use this as the default sink so apps see a stereo device.
    # Avoids games treating the raw 6ch ALSA sink as surround sound.
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO8 Main Output"
            capture.props = {
                media.class = Audio/Sink
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo8_main_output"
                node.description = "EVO8 Main Output"
            }
            playback.props = {
                node.target = "alsa_output.usb-Audient_EVO8-00.analog-surround-51"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }
    # -- Output 3+4 ----------------------------------------------------------
    # Stereo sink -> ALSA playback CH3/CH4 (FC/LFE)
    # Second output pair, feeds MU60 mixer output pair 2.
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO8 Output 3+4"
            capture.props = {
                media.class = Audio/Sink
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo8_output_3_4"
                node.description = "EVO8 Output 3+4"
            }
            playback.props = {
                node.target = "alsa_output.usb-Audient_EVO8-00.analog-surround-51"
                audio.channels = 2
                audio.position = [ FC LFE ]
                stream.dont-remix = true
            }
        }
    }
    # -- Loopback Output ------------------------------------------------------
    # Stereo sink -> ALSA playback CH5/CH6 (RL/RR)
    # Audio sent here feeds MU60 loopback inputs (LOOP-BACK 1+2 in mixer).
    # NOTE: Do NOT set node.passive on the playback side - it would
    # prevent this module from activating the ALSA sink, silencing
    # the loopback output entirely.
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO8 Loopback Output"
            capture.props = {
                media.class = Audio/Sink
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo8_loopback_output"
                node.description = "EVO8 Loopback Output"
            }
            playback.props = {
                node.target = "alsa_output.usb-Audient_EVO8-00.analog-surround-51"
                audio.channels = 2
                audio.position = [ RL RR ]
                stream.dont-remix = true
            }
        }
    }
    # -- Microphone 1+2 ------------------------------------------------------
    # ALSA capture CH1/CH2 (FL/FR) -> stereo source
    # Physical mic/line inputs 1+2 after preamp (FU11 gain).
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO8 Microphone 1+2"
            capture.props = {
                node.target = "alsa_input.usb-Audient_EVO8-00.analog-surround-51"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                node.passive = true
            }
            playback.props = {
                media.class = Audio/Source
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo8_mic_1_2"
                node.description = "EVO8 Microphone 1+2"
            }
        }
    }
    # -- Microphone 3+4 ------------------------------------------------------
    # ALSA capture CH3/CH4 (FC/LFE) -> stereo source
    # Physical mic/line inputs 3+4 after preamp.
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO8 Microphone 3+4"
            capture.props = {
                node.target = "alsa_input.usb-Audient_EVO8-00.analog-surround-51"
                audio.channels = 2
                audio.position = [ FC LFE ]
                stream.dont-remix = true
                node.passive = true
            }
            playback.props = {
                media.class = Audio/Source
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo8_mic_3_4"
                node.description = "EVO8 Microphone 3+4"
            }
        }
    }
    # -- Loopback Capture ----------------------------------------------------
    # ALSA capture CH5/CH6 (RL/RR) -> stereo source
    # Captures the MU60 mixer's loopback bus output.
    {   name = libpipewire-module-loopback
        args = {
            node.description = "EVO8 Loopback"
            capture.props = {
                node.target = "alsa_input.usb-Audient_EVO8-00.analog-surround-51"
                audio.channels = 2
                audio.position = [ RL RR ]
                stream.dont-remix = true
                node.passive = true
            }
            playback.props = {
                media.class = Audio/Source
                audio.channels = 2
                audio.position = [ FL FR ]
                node.name = "evo8_loopback_capture"
                node.description = "EVO8 Loopback"
            }
        }
    }
]
